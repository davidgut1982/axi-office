name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Version, publish, push
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "=== Step 1: Check for changesets ==="
          find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l || true
          echo "=== Step 2: Version packages ==="
          pnpm changeset version
          echo "=== Step 3: Stage and commit version changes ==="
          git add -A
          git commit -m "chore: release packages [skip ci]" || echo "nothing to commit"
          echo "=== Step 4: Publish to NPM ==="
          pnpm changeset publish
          echo "=== Step 5: Push to GitHub ==="
          git push --follow-tags origin HEAD:main 2>&1 || (echo "WARN: push failed but publish succeeded"; exit 0)
          echo "=== Release complete ==="
